# LiteLLM Configuration
# Pairwise Behavioral Signatures Research
# Prices verified: March 15, 2026

model_list:
  - model_name: llama-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 150
      response_format: {"type": "json_object"}
      # Groq: automatic prompt caching (50% discount on cached input tokens)
      # Input: $0.59/1M | Output: $0.79/1M | Cache hit: $0.30/1M

  - model_name: deepseek-chat
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 150
      response_format: {"type": "json_object"}
      # DeepSeek V3 via OpenRouter (direct DeepSeek API unavailable from India)
      # OpenRouter pricing: ~$0.26/1M input, $0.38/1M output (no significant markup vs direct)
      # IMPORTANT: json_object only, no json_schema enforcement — include schema in prompt text

  - model_name: deepseek-reasoner
    litellm_params:
      model: openrouter/deepseek/deepseek-r1
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 300
      # DeepSeek R1 via OpenRouter (reasoner mode for DeepSeek agent reflections ONLY)
      # No JSON mode — reasoner uses thinking chains. max_tokens 300 for thinking chain prefix.

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY
      max_tokens: 200
      # Input: $0.30/1M | Output: $2.50/1M | Cache: ~$0.075/1M
      # REQUIRES paid-tier Google AI Studio key (billing-enabled GCP project)
      # Free-tier key hits 429 immediately on burst calls (15 RPM limit)
      # CRITICAL: thinking disabled via thinking={'type':'disabled','budget_tokens':0} in ALL calls
      # This maps to thinkingConfig.thinkingBudget=0 in the API request
      # Verified: reasoning_tokens=None when correctly disabled
      # Do NOT use response_format json_object — strip markdown fences in parser instead

  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-2506
      # PINNED to mistral-small-2506 (3.1-2503 no longer available on this account)
      # mistral-small-latest resolves to 2506 as of March 2026 — pin dated ID for reproducibility
      api_key: os.environ/MISTRAL_API_KEY
      max_tokens: 150
      response_format: {"type": "json_object"}
      # Input: $0.10/1M | Output: $0.30/1M | No caching

  - model_name: gm
    litellm_params:
      model: mistral/mistral-small-2506
      api_key: os.environ/MISTRAL_API_KEY
      max_tokens: 200
      response_format: {"type": "json_object"}
      # GM model: same as mistral-small but with higher max_tokens for resolution output

router_settings:
  retry_policy:
    max_retries: 3
    retry_after: 2  # seconds between retries
  budget_config:
    max_budget: 80  # USD hard cap — STOP ALL CALLS if exceeded
    budget_duration: "total"  # not per-day, total project cap
  routing_strategy: "simple-shuffle"  # no complex routing needed

# Cost tracking
success_callback: ["langfuse"]  # optional: add langfuse for cost dashboard
failure_callback: ["slack"]     # optional: alert on failures
